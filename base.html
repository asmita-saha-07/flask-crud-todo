<!doctype html>
<html lang="en">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My ToDo</title>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">My ToDo</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                </ul>



            </div>
        </div>
    </nav>
    <h3>Add a ToDo</h3>
    <form action="/" method="POST">
        <div class="container mt-5 d-flex justify-content-center">
            <div style="width: 400px;">


                <div class="mb-3">
                    <label for="addtodo" class="form-label">Add ToDo Title</label>
                    <input type="text" name="title" class="form-control" id="addtodo">
                </div>

                <div class="mb-3">
                    <label for="adddesc" class="form-label">Add Description</label>
                    <input type="text" name="desc" class="form-control" id="adddesc">
                </div>

                <button type="submit" class="btn btn-success w-100">Submit</button>
    </form>
    </div>
    </div>
    <h3>ToDos</h3>

    {% block content %}
    {% endblock %}
</body>

</html>
